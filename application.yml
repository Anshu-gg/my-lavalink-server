server:
  port: ${PORT:2333}
  address: 0.0.0.0

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - ANDROID_VR
      - WEB
      - TVHTML5EMBEDDED

lavalink:
  plugins:
    # Updated to latest stable version (was 1.11.4, latest is 1.11.4+)
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.11.4"
      repository: "https://maven.lavalink.dev/releases"
  server:
    password: "youshallnotpass"
    sources:
      youtube: false      # handled by the plugin above
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    # Memory-optimised settings for Render free tier (512MB RAM)
    bufferDurationMs: 200
    frameBufferDurationMs: 2000
    opusEncodingQuality: 5
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: false
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""

logging:
  file:
    path: ./logs/
  level:
    root: WARN
    lavalink: INFO
    # Enable DEBUG for voice connection troubleshooting
    lavalink.server.io.socket.handlers.VoiceWebSocketClient: DEBUG
    lavalink.server.player.AudioPlayerManager: DEBUG
