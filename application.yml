server:
  port: ${PORT:2333}
  address: 0.0.0.0

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - ANDROID_VR
      - WEB
      - TVHTML5EMBEDDED

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.11.4"
      repository: "https://maven.lavalink.dev/releases"
  server:
    password: "youshallnotpass"
    sources:
      youtube: false      # handled by the plugin above
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    # Memory-optimised settings for Render free tier (512MB RAM)
    bufferDurationMs: 200           # Reduced from 400
    frameBufferDurationMs: 2000     # Reduced from 5000 (saves ~50MB peak RAM)
    opusEncodingQuality: 5          # Reduced from 10 (lower CPU/RAM)
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: false          # Disabled to save RAM
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""

logging:
  file:
    path: ./logs/
  level:
    root: WARN       # Changed from INFO to reduce I/O and RAM usage
    lavalink: INFO
